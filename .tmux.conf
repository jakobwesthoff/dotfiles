# Enable RGB colour for outer terminals
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -ga terminal-overrides ",ghostty:Tc"
set -s extended-keys on
set-option -g focus-events on

set -g allow-passthrough off

# Change the prefix key to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Avoid ESC delay
set -s escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Do not detach if last window of a session is closed, but switch to the next session
set-option -g detach-on-destroy off

# Move status bar to the top
#set-option -g status-position top

# Turn the mouse on
set -g mouse on

# set scroll history to 100,000 lines
set-option -g history-limit 100000


# unbind the prefix and bind it to Ctrl-a like screen
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Fix titlebar
set -g set-titles on
set -g set-titles-string "#T"

# Use OSC 52 for clipboard so copies work both locally and over SSH.
# tmux emits the OSC 52 sequence to the outer terminal (Ghostty), which sets
# the macOS clipboard. Over SSH, the sequence travels through the connection
# to whatever terminal the SSH client is running, so the correct clipboard
# is always targeted. This also removes the pbcopy dependency entirely.
set -s set-clipboard on

# Vi copy mode for keyboard-driven selection.
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi enter send-keys -X copy-selection-and-cancel
bind P paste-buffer
bind-key v copy-mode

# Mouse drag enters copy mode and copies on release via OSC 52.
bind -n MouseDrag1Pane { if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' { send -M } { copy-mode -M } }
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Allow for pane renumbering
bind-key ß move-window -r

# Open new panes in the current working directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Sesh
bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

